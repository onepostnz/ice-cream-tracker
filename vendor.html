<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard - Ice Cream Tracker NZ</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC6ftSvpvvPdNPGe3lbD81KJEEQB_zYTV0&libraries=places"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #2B4C7E 0%, #3D5A8C 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Auth Screen */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header h1 {
            color: #2B4C7E;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .auth-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2B4C7E;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #2B4C7E;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1e3558;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(43, 76, 126, 0.3);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        
        .auth-toggle a {
            color: #2B4C7E;
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-toggle a:hover {
            text-decoration: underline;
        }
        
        /* Dashboard */
        .dashboard {
            display: none;
        }
        
        .dashboard-header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .dashboard-header h1 {
            color: #2B4C7E;
            font-size: 24px;
        }
        
        .dashboard-header .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .dashboard-header .user-email {
            color: #666;
            font-size: 14px;
        }
        
        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #2B4C7E;
            font-size: 20px;
            margin-bottom: 20px;
        }
        
        .events-list {
            margin-top: 20px;
        }
        
        .event-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #2B4C7E;
        }
        
        .event-item h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .event-item p {
            color: #666;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .event-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        
        .event-actions button {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-edit {
            background: #17a2b8;
            color: white;
        }
        
        .btn-edit:hover {
            background: #138496;
        }
        
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        
        .btn-delete:hover {
            background: #c82333;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        #map {
            width: 100%;
            height: 300px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .dashboard-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>🍦 Ice Cream Tracker NZ</h1>
                <p id="authTitle">Vendor Login</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <form id="authForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="vendor@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                
                <div class="form-group" id="businessNameGroup" style="display: none;">
                    <label for="businessName">Business Name</label>
                    <input type="text" id="businessName" placeholder="e.g., Mr Whippy Auckland">
                </div>
                
                <button type="submit" class="btn btn-primary" id="authButton">Login</button>
            </form>
            
            <div class="auth-toggle">
                <span id="authToggleText">Don't have an account?</span>
                <a href="#" id="authToggleLink">Sign up</a>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="container">
            <div class="dashboard-header">
                <div>
                    <h1>Vendor Dashboard</h1>
                    <p class="user-email" id="userEmail"></p>
                </div>
                <div class="user-info">
                    <button class="btn btn-secondary btn-small" onclick="logout()">Logout</button>
                </div>
            </div>
            
            <div class="dashboard-grid">
                <!-- Create Event Card -->
                <div class="card">
                    <h2>Create New Event</h2>
                    
                    <div id="successMessage" class="success-message"></div>
                    
                    <form id="eventForm">
                        <div class="form-group">
                            <label for="eventName">Event Name</label>
                            <input type="text" id="eventName" required placeholder="Summer Ice Cream Festival">
                        </div>
                        
                        <div class="form-group">
                            <label for="eventLocation">Location</label>
                            <input type="text" id="eventLocation" required placeholder="Search for a location">
                        </div>
                        
                        <div id="map"></div>
                        
                        <div class="form-group">
                            <label for="eventDate">Date</label>
                            <input type="date" id="eventDate" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="eventTime">Time</label>
                            <input type="time" id="eventTime" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="eventDuration">Duration (hours)</label>
                            <input type="number" id="eventDuration" required min="0.5" step="0.5" value="2">
                        </div>
                        
                        <div class="form-group">
                            <label for="eventDescription">Description</label>
                            <textarea id="eventDescription" rows="3" placeholder="Tell customers about your event..."></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary" id="createEventBtn">Create Event</button>
                    </form>
                </div>
                
                <!-- My Events Card -->
                <div class="card">
                    <h2>My Events</h2>
                    <div id="eventsList" class="events-list">
                        <div class="empty-state">
                            <div class="empty-state-icon">📅</div>
                            <p>No events yet. Create your first event!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBTqN8gN3hP_Xz6vZQQXx4PY5Hd8VX2xYw",
            authDomain: "icecreamtracker-9625b.firebaseapp.com",
            databaseURL: "https://icecreamtracker-9625b-default-rtdb.firebaseio.com",
            projectId: "icecreamtracker-9625b",
            storageBucket: "icecreamtracker-9625b.firebasestorage.app",
            messagingSenderId: "468582467639",
            appId: "1:468582467639:web:7d4e7a16b5d8e4c0f3e8d2"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let map;
        let marker;
        let selectedLocation = null;
        let isSignUp = false;
        let currentUser = null;
        let editingEventId = null;

        // Initialize map
        function initMap() {
            // Default to Auckland, NZ
            const defaultCenter = { lat: -36.8485, lng: 174.7633 };
            
            map = new google.maps.Map(document.getElementById('map'), {
                center: defaultCenter,
                zoom: 13,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: false
            });

            marker = new google.maps.Marker({
                map: map,
                draggable: true,
                animation: google.maps.Animation.DROP
            });

            // Location search autocomplete
            const locationInput = document.getElementById('eventLocation');
            const autocomplete = new google.maps.places.Autocomplete(locationInput, {
                componentRestrictions: { country: 'nz' },
                fields: ['geometry', 'formatted_address']
            });

            autocomplete.addListener('place_changed', () => {
                const place = autocomplete.getPlace();
                if (place.geometry) {
                    const location = place.geometry.location;
                    selectedLocation = {
                        lat: location.lat(),
                        lng: location.lng(),
                        address: place.formatted_address
                    };
                    map.setCenter(location);
                    marker.setPosition(location);
                }
            });

            // Update location when marker is dragged
            marker.addListener('dragend', () => {
                const position = marker.getPosition();
                selectedLocation = {
                    lat: position.lat(),
                    lng: position.lng()
                };
            });
        }

        // Auth state observer
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                showDashboard();
                loadEvents();
            } else {
                showAuth();
            }
        });

        // Toggle between login and signup
        document.getElementById('authToggleLink').addEventListener('click', (e) => {
            e.preventDefault();
            isSignUp = !isSignUp;
            
            if (isSignUp) {
                document.getElementById('authTitle').textContent = 'Vendor Sign Up';
                document.getElementById('authButton').textContent = 'Sign Up';
                document.getElementById('businessNameGroup').style.display = 'block';
                document.getElementById('authToggleText').textContent = 'Already have an account?';
                document.getElementById('authToggleLink').textContent = 'Login';
            } else {
                document.getElementById('authTitle').textContent = 'Vendor Login';
                document.getElementById('authButton').textContent = 'Login';
                document.getElementById('businessNameGroup').style.display = 'none';
                document.getElementById('authToggleText').textContent = "Don't have an account?";
                document.getElementById('authToggleLink').textContent = 'Sign up';
            }
        });

        // Auth form submission
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const businessName = document.getElementById('businessName').value;
            
            try {
                if (isSignUp) {
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    // Save vendor profile
                    await db.collection('vendors').doc(userCredential.user.uid).set({
                        email: email,
                        businessName: businessName,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    await auth.signInWithEmailAndPassword(email, password);
                }
            } catch (error) {
                showError(error.message);
            }
        });

        // Event form submission
        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!selectedLocation) {
                showError('Please select a location on the map');
                return;
            }
            
            const eventData = {
                name: document.getElementById('eventName').value,
                location: selectedLocation,
                date: document.getElementById('eventDate').value,
                time: document.getElementById('eventTime').value,
                duration: parseFloat(document.getElementById('eventDuration').value),
                description: document.getElementById('eventDescription').value,
                vendorId: currentUser.uid,
                vendorEmail: currentUser.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'upcoming'
            };
            
            try {
                if (editingEventId) {
                    await db.collection('events').doc(editingEventId).update(eventData);
                    showSuccess('Event updated successfully!');
                    editingEventId = null;
                    document.getElementById('createEventBtn').textContent = 'Create Event';
                } else {
                    await db.collection('events').add(eventData);
                    showSuccess('Event created successfully!');
                }
                
                document.getElementById('eventForm').reset();
                selectedLocation = null;
                marker.setPosition(null);
                loadEvents();
            } catch (error) {
                showError('Error creating event: ' + error.message);
            }
        });

        // Load vendor's events
        function loadEvents() {
            db.collection('events')
                .where('vendorId', '==', currentUser.uid)
                .orderBy('createdAt', 'desc')
                .onSnapshot((snapshot) => {
                    const eventsList = document.getElementById('eventsList');
                    
                    if (snapshot.empty) {
                        eventsList.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">📅</div>
                                <p>No events yet. Create your first event!</p>
                            </div>
                        `;
                        return;
                    }
                    
                    eventsList.innerHTML = '';
                    snapshot.forEach((doc) => {
                        const event = doc.data();
                        const eventEl = document.createElement('div');
                        eventEl.className = 'event-item';
                        eventEl.innerHTML = `
                            <h3>${event.name}</h3>
                            <p>📍 ${event.location.address || 'Location set on map'}</p>
                            <p>📅 ${event.date} at ${event.time}</p>
                            <p>⏱️ ${event.duration} hour(s)</p>
                            <p>${event.description || 'No description'}</p>
                            <div class="event-actions">
                                <button class="btn-edit" onclick="editEvent('${doc.id}')">Edit</button>
                                <button class="btn-delete" onclick="deleteEvent('${doc.id}')">Delete</button>
                            </div>
                        `;
                        eventsList.appendChild(eventEl);
                    });
                });
        }

        // Edit event
        function editEvent(eventId) {
            editingEventId = eventId;
            
            db.collection('events').doc(eventId).get().then((doc) => {
                const event = doc.data();
                document.getElementById('eventName').value = event.name;
                document.getElementById('eventLocation').value = event.location.address || '';
                document.getElementById('eventDate').value = event.date;
                document.getElementById('eventTime').value = event.time;
                document.getElementById('eventDuration').value = event.duration;
                document.getElementById('eventDescription').value = event.description || '';
                
                selectedLocation = event.location;
                map.setCenter(selectedLocation);
                marker.setPosition(selectedLocation);
                
                document.getElementById('createEventBtn').textContent = 'Update Event';
                window.scrollTo(0, 0);
            });
        }

        // Delete event
        async function deleteEvent(eventId) {
            if (confirm('Are you sure you want to delete this event?')) {
                try {
                    await db.collection('events').doc(eventId).delete();
                    showSuccess('Event deleted successfully!');
                } catch (error) {
                    showError('Error deleting event: ' + error.message);
                }
            }
        }

        // Logout
        function logout() {
            auth.signOut();
        }

        // UI helpers
        function showAuth() {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userEmail').textContent = currentUser.email;
            
            // Initialize map when dashboard is shown
            setTimeout(() => {
                initMap();
            }, 100);
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.style.display = 'block';
            setTimeout(() => {
                successEl.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
